# To run all pre-commit checks, use:
#
#     uvx prek run -a
#
# To install pre-commit hooks that run every time you commit:
#
#     uv tool install prek
#     prek install
#

ci:
  autoupdate_commit_msg: "⬆️🪝 update pre-commit hooks"
  autoupdate_schedule: quarterly
  autofix_commit_msg: "🎨 pre-commit fixes"
  skip: [ty]

repos:
  ## Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        priority: 0
      - id: end-of-file-fixer
        priority: 1
      - id: trailing-whitespace
        priority: 2

  ## Check JSON schemata
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.3
    hooks:
      - id: check-github-workflows
        priority: 0
      - id: check-readthedocs
        priority: 0

  ## Check best practices for scientific Python code
  - repo: https://github.com/scientific-python/cookie
    rev: 2026.06.18
    hooks:
      - id: sp-repo-review
        additional_dependencies: ["repo-review[cli]"]
        priority: 0

  ## Check pyproject.toml file
  - repo: https://github.com/henryiii/validate-pyproject-schema-store
    rev: 2026.06.26
    hooks:
      - id: validate-pyproject
        priority: 0

  ## Ensure uv.lock is up to date
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.25
    hooks:
      - id: uv-lock
        priority: 0
        pass_filenames: false
        env:
          UV_RESOLUTION: highest

  ## Check for common capitalization mistakes
  - repo: local
    hooks:
      - id: disallow-caps
        name: Disallow improper capitalization
        language: pygrep
        entry: \b(Numpy|Github|PyTest|Mqt|Tum)\b
        exclude: ^(\.pre-commit-config\.yaml)$
        priority: 0

  ## Check for typos
  - repo: https://github.com/adhtruong/mirrors-typos
    rev: v1.47.2
    hooks:
      - id: typos
        priority: 3

  ## Check license headers
  - repo: https://github.com/emzeat/mz-lictools
    rev: v2.9.0
    hooks:
      - id: license-tools
        priority: 4

  ## Format BibTeX files with bibtex-tidy
  - repo: https://github.com/FlamingTempura/bibtex-tidy
    rev: v1.14.0
    hooks:
      - id: bibtex-tidy
        args:
          [
            "--align=20",
            "--curly",
            "--months",
            "--blank-lines",
            "--sort",
            "--strip-enclosing-braces",
            "--sort-fields",
            "--trailing-commas",
            "--remove-empty-fields",
          ]
        priority: 5

  ## Format configuration files with prettier
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.9.1
    hooks:
      - id: prettier
        types_or: [yaml, markdown, html, css, scss, javascript, json, json5]
        priority: 5

  ## Format and lint Python files with ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        require_serial: true
        priority: 6
      - id: ruff-format
        types_or: [python, pyi, jupyter, markdown]
        priority: 7

  ## Check Python types with ty
  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.55
    hooks:
      - id: ty
        args: [--isolated]
        priority: 8
